name: Build Windows

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET Framework 4.5.2 Developer Pack
      run: |
        $url = "https://download.microsoft.com/download/B/2/4/B24BFB74-31CD-443B-84B9-6B2C9770DC2D/NDP452-DevPack-ENU.exe"
        Invoke-WebRequest -Uri $url -OutFile "NDP452-DevPack.exe"
        & ".\NDP452-DevPack.exe" /quiet /norestart
        del ".\NDP452-DevPack.exe"
    
    - name: Restore dependencies
      run: nuget restore Steamless.sln
    
    - name: Build
      run: msbuild Steamless.sln /p:Configuration=${{ matrix.configuration }}
  
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: steamless-${{ matrix.configuration }}
        path: |
          **/bin/${{ matrix.configuration }}/**
          !**/bin/${{ matrix.configuration }}/**/*.pdb
