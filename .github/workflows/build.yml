name: Build Windows

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET Framework 4.5.2 Developer Pack
      run: |
        choco install netfx-4.5.2-devpack -y
    
    - name: Restore dependencies
      run: nuget restore Steamless.sln
    
    - name: Build
      run: msbuild Steamless.sln /p:Configuration=${{ matrix.configuration }}
  
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: steamless-${{ matrix.configuration }}
        path: |
          D:\a\Steamless\Steamless\Steamless\bin\x86\Debug\
          D:\a\Steamless\Steamless\Steamless\bin\x86\Debug\Steamless.CLI.pdb
